version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_DB: harvestnet
      POSTGRES_USER: harvestnet
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"  # Changed from 5432 to 5435 (host:container)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harvestnet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://harvestnet:password123@postgres:5432/harvestnet  # Internal container port stays 5432
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: "http://localhost:3025"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3025:3025"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_PORT: 3025
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --port 3025 --host 0.0.0.0

volumes:
  postgres_data: