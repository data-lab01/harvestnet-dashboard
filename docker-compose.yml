services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: harvestnet
      POSTGRES_USER: harvestnet
      POSTGRES_PASSWORD: password123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harvestnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://harvestnet:password123@postgres:5432/harvestnet

  frontend:
    image: nginx:alpine
    ports:
      - "3025:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
